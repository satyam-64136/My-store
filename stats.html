<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Store Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="style.css"/>
  <style>
    /* ── Stats page specific ── */
    .stats-wrap { max-width: 700px; margin: 0 auto; padding: calc(54px + 16px) 14px 60px; }

    .stats-section-title {
      font-family: var(--f-head); font-size: .72rem; font-weight: 700;
      color: var(--t3); text-transform: uppercase; letter-spacing: .1em;
      margin: 28px 0 10px;
    }

    /* KPI strip */
    .kpi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    @media (min-width: 500px) { .kpi-grid { grid-template-columns: repeat(4, 1fr); } }
    .kpi-card {
      background: var(--surface-2); border: 1px solid var(--b1);
      border-radius: 12px; padding: 14px 12px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .kpi-icon { color: var(--t3); margin-bottom: 4px; }
    .kpi-val { font-family: var(--f-mono); font-size: 1.2rem; font-weight: 700; color: var(--t1); letter-spacing: -.02em; }
    .kpi-lbl { font-size: .62rem; color: var(--t3); font-family: var(--f-head); text-transform: uppercase; letter-spacing: .07em; }
    .kpi-delta { font-size: .62rem; font-family: var(--f-mono); margin-top: 2px; }
    .kpi-delta.up { color: #6ee7b7; }
    .kpi-delta.down { color: var(--red); }
    .kpi-delta.neutral { color: var(--t3); }

    /* Chart cards */
    .chart-card {
      background: var(--surface-2); border: 1px solid var(--b1);
      border-radius: 14px; padding: 16px;
      margin-bottom: 10px;
    }
    .chart-title {
      font-family: var(--f-head); font-size: .78rem; font-weight: 600;
      color: var(--t1); margin-bottom: 14px;
      display: flex; align-items: center; gap: 6px;
    }
    .chart-title svg { color: var(--t3); }
    .chart-wrap { position: relative; height: 180px; }

    /* Period selector */
    .period-bar {
      display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap;
    }
    .period-btn {
      padding: 5px 12px; border-radius: 99px; border: 1px solid var(--b1);
      background: transparent; color: var(--t3); font-family: var(--f-mono);
      font-size: .62rem; cursor: pointer; transition: all .15s; font-weight: 600;
      letter-spacing: .04em;
    }
    .period-btn.active {
      background: var(--surface-4); border-color: var(--b2); color: var(--t1);
    }

    /* Top items list */
    .item-row {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 0; border-bottom: 1px solid var(--b0);
    }
    .item-row:last-child { border-bottom: none; }
    .item-rank {
      font-family: var(--f-mono); font-size: .62rem; color: var(--t3);
      width: 18px; text-align: center; flex-shrink: 0;
    }
    .item-bar-wrap { flex: 1; min-width: 0; }
    .item-name { font-size: .78rem; font-weight: 600; color: var(--t1); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-bar-track { height: 3px; background: var(--b1); border-radius: 99px; overflow: hidden; }
    .item-bar-fill { height: 100%; border-radius: 99px; background: var(--t2); transition: width .6s cubic-bezier(.4,0,.2,1); }
    .item-meta { font-family: var(--f-mono); font-size: .64rem; color: var(--t2); white-space: nowrap; text-align: right; flex-shrink: 0; }
    .item-meta span { display: block; color: var(--t3); font-size: .58rem; margin-top: 1px; }

    /* Suggestions */
    .suggestion-card {
      background: var(--surface-2); border: 1px solid var(--b1);
      border-radius: 12px; padding: 14px;
      margin-bottom: 8px; display: flex; gap: 12px; align-items: flex-start;
    }
    .suggestion-icon {
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .suggestion-title { font-size: .78rem; font-weight: 600; color: var(--t1); margin-bottom: 3px; }
    .suggestion-body { font-size: .7rem; color: var(--t3); line-height: 1.55; }

    /* Loading / empty */
    .stats-loading { text-align: center; padding: 60px 0; color: var(--t3); font-size: .76rem; }
    .stats-spinner { width: 24px; height: 24px; border: 2px solid var(--b1); border-top-color: var(--t2); border-radius: 50%; animation: spin .75s linear infinite; margin: 0 auto 12px; }

    /* Period label */
    .period-label { font-size: .64rem; color: var(--t3); font-family: var(--f-mono); margin-left: auto; }

    /* Profit margin badge */
    .margin-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 99px; font-family: var(--f-mono);
      font-size: .6rem; font-weight: 700;
    }
    .margin-badge.good { background: rgba(110,231,183,.1); color: #6ee7b7; border: 1px solid rgba(110,231,183,.2); }
    .margin-badge.warn { background: rgba(200,144,42,.1); color: var(--amber); border: 1px solid rgba(200,144,42,.2); }
    .margin-badge.bad  { background: rgba(214,79,79,.1);  color: var(--red);   border: 1px solid rgba(214,79,79,.2); }

    /* Day-of-week heatmap */
    .dow-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
    .dow-cell {
      aspect-ratio: 1; border-radius: 6px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 2px;
    }
    .dow-label { font-family: var(--f-mono); font-size: .5rem; color: var(--t3); }
    .dow-val { font-family: var(--f-mono); font-size: .58rem; font-weight: 700; }
  </style>
</head>
<body>

<!-- ════ NAV ════ -->
<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">Satyam's Store</a>
    <div style="display:flex;align-items:center;gap:6px">
      <a href="index.html" class="nav-link">
        <i data-lucide="store" style="width:12px;height:12px"></i> Store
      </a>
      <a href="admin.html" class="nav-link-icon" title="Admin">
        <i data-lucide="settings" style="width:14px;height:14px"></i>
      </a>
    </div>
  </div>
</nav>

<div class="stats-wrap">

  <!-- Header -->
  <div style="margin-bottom:20px">
    <div style="font-family:var(--f-head);font-size:1.3rem;font-weight:800;color:var(--t1);letter-spacing:-.03em">Analytics</div>
    <div style="font-size:.72rem;color:var(--t3);margin-top:3px" id="last-updated">Loading data…</div>
  </div>

  <!-- Period selector -->
  <div class="period-bar">
    <button class="period-btn" data-days="7">7 Days</button>
    <button class="period-btn active" data-days="30">30 Days</button>
    <button class="period-btn" data-days="90">90 Days</button>
    <button class="period-btn" data-days="0">All Time</button>
  </div>

  <div id="stats-loading" class="stats-loading">
    <div class="stats-spinner"></div>
    Crunching your numbers…
  </div>

  <div id="stats-content" style="display:none">

    <!-- KPI Strip -->
    <div class="kpi-grid" id="kpi-grid"></div>

    <!-- Revenue & Profit chart -->
    <p class="stats-section-title">Revenue & Profit</p>
    <div class="chart-card">
      <div class="chart-title">
        <i data-lucide="trending-up" style="width:12px;height:12px"></i>
        Daily Overview
        <span class="period-label" id="chart-period-label"></span>
      </div>
      <div class="chart-wrap">
        <canvas id="revenue-chart"></canvas>
      </div>
    </div>

    <!-- Orders per day chart -->
    <div class="chart-card">
      <div class="chart-title">
        <i data-lucide="shopping-bag" style="width:12px;height:12px"></i>
        Orders per Day
      </div>
      <div class="chart-wrap" style="height:130px">
        <canvas id="orders-chart"></canvas>
      </div>
    </div>

    <!-- Top items -->
    <p class="stats-section-title">Top Items by Revenue</p>
    <div class="chart-card" style="padding-bottom:4px">
      <div id="top-items-list"></div>
    </div>

    <!-- Profit margin per item -->
    <p class="stats-section-title">Profit Margin by Item</p>
    <div class="chart-card" style="padding-bottom:4px">
      <div id="margin-list"></div>
    </div>

    <!-- Day of week heatmap -->
    <p class="stats-section-title">Busiest Days</p>
    <div class="chart-card">
      <div class="dow-grid" id="dow-grid"></div>
    </div>

    <!-- Suggestions -->
    <p class="stats-section-title">Suggestions</p>
    <div id="suggestions-list"></div>

  </div><!-- /stats-content -->
</div>

<div id="toast" class="toast hidden"></div>

<script src="shared.js"></script>
<script>
/* ════════════════════════════════════════
   STATS PAGE — Satyam's Store
   ════════════════════════════════════════ */

let _period   = 30;   // days; 0 = all time
let _orders   = [];
let _products = [];
let _revenueChart = null;
let _ordersChart  = null;

/* ── Period buttons ─────────────────────── */
document.querySelectorAll('.period-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    _period = parseInt(btn.dataset.days, 10);
    renderAll();
  });
});

/* ── Boot ───────────────────────────────── */
window.addEventListener('DOMContentLoaded', async () => {
  if (typeof lucide !== 'undefined') lucide.createIcons();
  else document.querySelector('script[src*="lucide"]')?.addEventListener('load', () => lucide.createIcons());
  await loadData();
});

async function loadData() {
  try {
    const [orders, products] = await Promise.all([
      sbGet('orders?status=eq.approved&order=created_at.asc&select=id,items,total,created_at'),
      sbGet('products?select=id,name,price,purchase_price,hidden&order=name.asc'),
    ]);
    _orders   = orders  || [];
    _products = parseProducts(products || []);
    document.getElementById('last-updated').textContent =
      'Updated ' + new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('stats-loading').style.display = 'none';
    document.getElementById('stats-content').style.display = 'block';
    renderAll();
  } catch(e) {
    document.getElementById('stats-loading').innerHTML =
      `<div style="color:var(--red);font-size:.74rem">Failed to load data.<br><small>${e.message}</small></div>`;
  }
}

/* ── Filter orders by period ────────────── */
function filteredOrders() {
  if (_period === 0) return _orders;
  const cutoff = Date.now() - _period * 86400000;
  return _orders.filter(o => {
    const ms = new Date(o.created_at).getTime();
    return ms >= cutoff;
  });
}

/* ── Derive stats ───────────────────────── */
function deriveStats(orders) {
  let totalRevenue = 0, totalProfit = 0, totalItems = 0;
  const byDay     = {};  // "YYYY-MM-DD" -> { revenue, profit, orders }
  const byItem    = {};  // item name -> { qty, revenue, profit }
  const byDow     = [0,0,0,0,0,0,0]; // sun=0..sat=6 revenue

  orders.forEach(o => {
    const d   = new Date(o.created_at);
    const key = d.toISOString().slice(0,10);
    const dow = d.getDay();
    if (!byDay[key]) byDay[key] = { revenue: 0, profit: 0, orders: 0 };
    byDay[key].orders++;

    const items = Array.isArray(o.items) ? o.items : [];
    items.forEach(i => {
      const qty = parseInt(i.qty,10) || 0;
      const sub = parseFloat(i.sub) || 0;
      const pp  = parseFloat(i.purchase_price) > 0
        ? parseFloat(i.purchase_price)
        : (_products.find(p => String(p.id) === String(i.id))?.purchase_price || 0);
      const profit = sub - pp * qty;
      totalRevenue += sub;
      totalProfit  += profit;
      totalItems   += qty;
      byDay[key].revenue += sub;
      byDay[key].profit  += profit;
      byDow[dow]         += sub;

      const name = i.name || 'Unknown';
      if (!byItem[name]) byItem[name] = { qty: 0, revenue: 0, profit: 0, pp };
      byItem[name].qty     += qty;
      byItem[name].revenue += sub;
      byItem[name].profit  += profit;
    });
  });

  return { totalRevenue, totalProfit, totalItems, byDay, byItem, byDow, orderCount: orders.length };
}

/* ── Main render ────────────────────────── */
function renderAll() {
  const orders = filteredOrders();
  const s      = deriveStats(orders);
  renderKPIs(s, orders);
  renderCharts(s);
  renderTopItems(s);
  renderMargins(s);
  renderDow(s);
  renderSuggestions(s, orders);
  if (typeof lucide !== 'undefined') lucide.createIcons();
}

/* ── KPIs ───────────────────────────────── */
function renderKPIs(s, orders) {
  const margin = s.totalRevenue > 0 ? (s.totalProfit / s.totalRevenue * 100) : 0;
  const avgOrder = orders.length > 0 ? s.totalRevenue / orders.length : 0;

  const kpis = [
    { icon: 'indian-rupee', val: '₹' + fmt(s.totalRevenue), lbl: 'Revenue' },
    { icon: 'trending-up',  val: '₹' + fmt(s.totalProfit),  lbl: 'Net Profit' },
    { icon: 'shopping-bag', val: String(orders.length),      lbl: 'Orders' },
    { icon: 'percent',      val: margin.toFixed(1) + '%',    lbl: 'Margin' },
  ];

  document.getElementById('kpi-grid').innerHTML = kpis.map(k => `
    <div class="kpi-card">
      <div class="kpi-icon"><i data-lucide="${k.icon}" style="width:13px;height:13px"></i></div>
      <div class="kpi-val">${k.val}</div>
      <div class="kpi-lbl">${k.lbl}</div>
    </div>
  `).join('');
}

/* ── Charts ─────────────────────────────── */
function renderCharts(s) {
  const days = Object.keys(s.byDay).sort();
  const label = _period === 0 ? 'All Time' : `Last ${_period} Days`;
  document.getElementById('chart-period-label').textContent = label;

  // Build display labels (shorten to MM/DD)
  const labels = days.map(d => {
    const [,m,dd] = d.split('-');
    return `${parseInt(m)}/${parseInt(dd)}`;
  });
  const revenues = days.map(d => +s.byDay[d].revenue.toFixed(2));
  const profits  = days.map(d => +s.byDay[d].profit.toFixed(2));
  const orderCounts = days.map(d => s.byDay[d].orders);

  const chartDefaults = {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false }, tooltip: { enabled: true, backgroundColor: '#1e1e22', titleColor: '#f2f0ec', bodyColor: '#868686', borderColor: 'rgba(255,255,255,.08)', borderWidth: 1, padding: 10, cornerRadius: 8 } },
    scales: {
      x: { ticks: { color: '#444449', font: { family: 'JetBrains Mono', size: 9 }, maxRotation: 0, maxTicksLimit: 8 }, grid: { color: 'rgba(255,255,255,.03)' }, border: { display: false } },
      y: { ticks: { color: '#444449', font: { family: 'JetBrains Mono', size: 9 }, callback: v => '₹'+fmt(v) }, grid: { color: 'rgba(255,255,255,.04)' }, border: { display: false } },
    },
  };

  /* Revenue + Profit line chart */
  if (_revenueChart) _revenueChart.destroy();
  _revenueChart = new Chart(document.getElementById('revenue-chart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Revenue', data: revenues, borderColor: 'rgba(242,240,236,.5)', borderWidth: 1.5, pointRadius: 0, tension: .35, fill: true, backgroundColor: 'rgba(242,240,236,.04)' },
        { label: 'Profit',  data: profits,  borderColor: '#6ee7b7',              borderWidth: 1.5, pointRadius: 0, tension: .35, fill: false },
      ],
    },
    options: { ...chartDefaults, interaction: { mode: 'index', intersect: false } },
  });

  /* Orders bar chart */
  if (_ordersChart) _ordersChart.destroy();
  _ordersChart = new Chart(document.getElementById('orders-chart'), {
    type: 'bar',
    data: { labels, datasets: [{ label: 'Orders', data: orderCounts, backgroundColor: 'rgba(255,255,255,.08)', borderRadius: 4, borderSkipped: false }] },
    options: {
      ...chartDefaults,
      scales: {
        x: { ...chartDefaults.scales.x },
        y: { ...chartDefaults.scales.y, ticks: { ...chartDefaults.scales.y.ticks, callback: v => v } },
      },
    },
  });
}

/* ── Top items ───────────────────────────── */
function renderTopItems(s) {
  const items = Object.entries(s.byItem)
    .map(([name, d]) => ({ name, ...d }))
    .sort((a,b) => b.revenue - a.revenue)
    .slice(0, 8);

  const maxRev = items[0]?.revenue || 1;

  document.getElementById('top-items-list').innerHTML = items.length ? items.map((item, i) => `
    <div class="item-row">
      <div class="item-rank">${i+1}</div>
      <div class="item-bar-wrap">
        <div class="item-name">${esc(item.name)}</div>
        <div class="item-bar-track">
          <div class="item-bar-fill" style="width:${(item.revenue/maxRev*100).toFixed(1)}%"></div>
        </div>
      </div>
      <div class="item-meta">
        ₹${fmt(item.revenue)}
        <span>×${item.qty} sold</span>
      </div>
    </div>
  `).join('') : '<div style="color:var(--t3);font-size:.74rem;padding:12px 0">No data</div>';
}

/* ── Margin list ─────────────────────────── */
function renderMargins(s) {
  const items = Object.entries(s.byItem)
    .map(([name, d]) => {
      const margin = d.revenue > 0 ? (d.profit / d.revenue * 100) : 0;
      return { name, profit: d.profit, margin, revenue: d.revenue };
    })
    .filter(i => i.revenue > 0)
    .sort((a,b) => b.margin - a.margin);

  document.getElementById('margin-list').innerHTML = items.length ? items.map(item => {
    const cls = item.margin >= 30 ? 'good' : item.margin >= 10 ? 'warn' : 'bad';
    return `
    <div class="item-row">
      <div class="item-bar-wrap">
        <div class="item-name">${esc(item.name)}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
        <span style="font-family:var(--f-mono);font-size:.7rem;color:var(--t2)">₹${fmt(item.profit)}</span>
        <span class="margin-badge ${cls}">${item.margin.toFixed(0)}%</span>
      </div>
    </div>`;
  }).join('') : '<div style="color:var(--t3);font-size:.74rem;padding:12px 0">No data</div>';
}

/* ── Day of week ─────────────────────────── */
function renderDow(s) {
  const names = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const max   = Math.max(...s.byDow, 1);
  document.getElementById('dow-grid').innerHTML = names.map((n, i) => {
    const v   = s.byDow[i];
    const pct = v / max;
    const bg  = `rgba(242,240,236,${(pct * .25 + .04).toFixed(2)})`;
    const col = pct > .5 ? 'var(--t1)' : pct > .2 ? 'var(--t2)' : 'var(--t3)';
    return `
    <div class="dow-cell" style="background:${bg}">
      <div class="dow-label">${n}</div>
      <div class="dow-val" style="color:${col}">${v > 0 ? '₹'+fmt(v) : '—'}</div>
    </div>`;
  }).join('');
}

/* ── Suggestions ─────────────────────────── */
function renderSuggestions(s, orders) {
  const tips = [];

  // Low margin items
  const lowMargin = Object.entries(s.byItem)
    .filter(([,d]) => d.revenue > 0 && (d.profit/d.revenue) < 0.1 && d.revenue > 50)
    .sort((a,b) => (a[1].profit/a[1].revenue) - (b[1].profit/b[1].revenue))
    .slice(0,2);
  lowMargin.forEach(([name, d]) => {
    const m = (d.profit/d.revenue*100).toFixed(0);
    tips.push({ icon: 'alert-triangle', color: 'rgba(214,79,79,.1)', iconColor: 'var(--red)', title: `Low margin on ${name}`, body: `Only ${m}% margin. Consider increasing the price or negotiating a lower buying price.` });
  });

  // Best performing item
  const best = Object.entries(s.byItem).sort((a,b) => b[1].profit - a[1].profit)[0];
  if (best) {
    tips.push({ icon: 'star', color: 'rgba(110,231,183,.07)', iconColor: '#6ee7b7', title: `${best[0]} is your top earner`, body: `₹${fmt(best[1].profit)} profit in this period. Keep it well stocked.` });
  }

  // Slow days
  const dowNames = ['Sundays','Mondays','Tuesdays','Wednesdays','Thursdays','Fridays','Saturdays'];
  const minDow = s.byDow.indexOf(Math.min(...s.byDow));
  const maxDow = s.byDow.indexOf(Math.max(...s.byDow));
  if (s.byDow[minDow] === 0 && orders.length > 5) {
    tips.push({ icon: 'moon', color: 'rgba(200,144,42,.07)', iconColor: 'var(--amber)', title: `No sales on ${dowNames[minDow]}`, body: `Consider closing earlier on ${dowNames[minDow]} to save time. ${dowNames[maxDow]} are your busiest.` });
  } else if (orders.length > 5) {
    tips.push({ icon: 'calendar', color: 'rgba(200,144,42,.07)', iconColor: 'var(--amber)', title: `${dowNames[maxDow]} are your busiest`, body: `Make sure you're well stocked before ${dowNames[maxDow]}. ${dowNames[minDow]} are the slowest.` });
  }

  // Out of stock products
  const outOfStock = _products.filter(p => !p.hidden && p.stock === 0);
  if (outOfStock.length) {
    tips.push({ icon: 'package-x', color: 'rgba(214,79,79,.07)', iconColor: 'var(--red)', title: `${outOfStock.length} item${outOfStock.length > 1 ? 's' : ''} out of stock`, body: outOfStock.map(p => p.name).join(', ') + ` — restock soon to avoid missing sales.` });
  }

  // Good margin
  const goodMargin = Object.entries(s.byItem).filter(([,d]) => d.revenue > 0 && d.profit/d.revenue > 0.4);
  if (goodMargin.length) {
    tips.push({ icon: 'zap', color: 'rgba(110,231,183,.07)', iconColor: '#6ee7b7', title: `${goodMargin.length} high-margin item${goodMargin.length > 1 ? 's' : ''}`, body: `${goodMargin.map(([n])=>n).join(', ')} have 40%+ margins. Prioritise these in stock.` });
  }

  if (!tips.length) {
    tips.push({ icon: 'check-circle', color: 'rgba(110,231,183,.07)', iconColor: '#6ee7b7', title: 'Looking good!', body: 'No major issues detected. Keep monitoring your margins as buying prices change.' });
  }

  document.getElementById('suggestions-list').innerHTML = tips.map(t => `
    <div class="suggestion-card">
      <div class="suggestion-icon" style="background:${t.color}">
        <i data-lucide="${t.icon}" style="width:14px;height:14px;color:${t.iconColor}"></i>
      </div>
      <div>
        <div class="suggestion-title">${t.title}</div>
        <div class="suggestion-body">${t.body}</div>
      </div>
    </div>
  `).join('');
}

/* ── Helpers ─────────────────────────────── */
function fmt(n) {
  n = +n;
  if (isNaN(n)) return '0';
  if (n >= 1000) return (n/1000).toFixed(1) + 'k';
  return n.toFixed(0);
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
